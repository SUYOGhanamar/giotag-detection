name: geodetect
description: VeriPic — Tamper-Proof Geotagged Camera & Deepfake Verification System
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  shimmer: ^3.0.0

  # Camera (native viewfinder + capture)
  camera: ^0.10.5+9

  # Location / GPS
  geolocator: ^11.0.0

  # Image processing (LSB steganography pixel manipulation)
  image: ^4.1.7

  # Image picker (gallery/camera fallback for verification screen)
  image_picker: ^1.0.7

  # Cryptography (SHA-256 / HMAC-SHA256)
  crypto: ^3.0.3

  # Secure key storage
  flutter_secure_storage: ^9.0.0

  # Runtime permissions
  permission_handler: ^11.3.1

  # Environment config
  flutter_dotenv: ^5.1.0

  # HTTP (NVIDIA API calls)
  http: ^1.2.1

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Charts
  fl_chart: ^0.67.0

  # Storage
  shared_preferences: ^2.2.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env