name: geodetect
description: Advanced Deepfake Geo-Tag Detection App
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # Image
  image_picker: ^1.0.7

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Charts
  fl_chart: ^0.67.0

  # Storage
  shared_preferences: ^2.2.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true